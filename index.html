<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portfolio Today</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --panel: #131a2b;
      --border: #273149;
      --text: #eef2ff;
      --muted: #98a2b8;
      --positive: #40d98b;
      --negative: #ff6b7a;
      --accent: #78a7ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(900px, calc(100% - 24px));
      margin: 22px auto;
    }

    .today-card {
      padding: 18px;
      margin-bottom: 14px;
      text-align: center;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
    }

    .today-label {
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .today-dollars {
      font-size: clamp(2rem, 10vw, 3.4rem);
      font-weight: 800;
      line-height: 1.05;
    }

    .today-percent {
      margin-top: 6px;
      font-size: 1rem;
      font-weight: 700;
    }

    .table-wrap {
      overflow-x: auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    table {
      width: 100%;
      min-width: 500px;
      border-collapse: collapse;
    }

    th, td {
      padding: 13px 14px;
      border-bottom: 1px solid var(--border);
      text-align: right;
      white-space: nowrap;
    }

    th {
      color: var(--muted);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      user-select: none;
    }

    th.sortable { cursor: pointer; }
    th.sortable:hover { color: var(--text); }
    th:first-child, td:first-child { text-align: left; }
    tbody tr:last-child td { border-bottom: 0; }
    tbody tr:hover { background: rgba(255, 255, 255, 0.025); }

    .ticker {
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .fund-note {
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0;
    }

    .badge {
      display: inline-block;
      margin-left: 6px;
      padding: 2px 5px;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 0.58rem;
      font-weight: 700;
      vertical-align: 1px;
    }

    .positive { color: var(--positive); }
    .negative { color: var(--negative); }
    .muted { color: var(--muted); }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 11px;
    }

    #status, #lastUpdated {
      color: var(--muted);
      font-size: 0.76rem;
    }

    #lastUpdated { margin-top: 3px; }

    button {
      flex: 0 0 auto;
      padding: 9px 12px;
      color: var(--text);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover { border-color: var(--accent); }
    button:disabled { cursor: wait; opacity: 0.6; }

    @media (max-width: 600px) {
      main { width: calc(100% - 16px); margin: 10px auto 18px; }
      .today-card { padding: 16px 12px; margin-bottom: 8px; }
      th, td { padding: 11px 10px; }
      table { min-width: 440px; }
      .fund-note { max-width: 155px; overflow: hidden; text-overflow: ellipsis; }
    }
  </style>
</head>
<body>
  <main>
    <section class="today-card" aria-label="Today's portfolio change">
      <div class="today-label">Today</div>
      <div class="today-dollars" id="todayDollars">—</div>
      <div class="today-percent" id="todayPercent">—</div>
    </section>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="sortable" data-sort="ticker">Ticker</th>
            <th class="sortable" data-sort="dayPercent">Today %</th>
            <th class="sortable" data-sort="todayGain">Today $</th>
            <th class="sortable" data-sort="shares">Shares</th>
          </tr>
        </thead>
        <tbody id="stockRows">
          <tr><td colspan="4" class="muted">Loading quotes…</td></tr>
        </tbody>
      </table>
    </div>

    <div class="status-row">
      <div>
        <div id="status" role="status">Initializing…</div>
        <div id="lastUpdated">Last updated: Never</div>
      </div>
      <button id="refreshButton" type="button">Refresh</button>
    </div>
  </main>

  <script>
    "use strict";

    const FINNHUB_API_KEY = "d9f696hr01qjcbq4gg50d9f696hr01qjcbq4gg5g";
    const TWELVE_DATA_API_KEY = "6912af7844eb4b90ac11578a7f6791a6";

    const FUND_PROXIES = {
      FXAIX: "SPY",
      FSMDX: "IWR",
      FSSNX: "IWM",
      FSGGX: "VXUS",
      FTIHX: "VXUS",
      FXNAX: "AGG"
    };

    const holdings = [
      { ticker: "SPY", name: "SPDR S&P 500 ETF Trust", shares: 73 },
      { ticker: "RSP", name: "Invesco S&P 500 Equal Weight ETF", shares: 392 },
      { ticker: "VXUS", name: "Vanguard Total International Stock ETF", shares: 90 },

      { ticker: "FSMDX", name: "Fidelity Mid Cap Index Fund", shares: 406 },
      { ticker: "FSSNX", name: "Fidelity Small Cap Index Fund", shares: 479 },
      { ticker: "FXAIX", name: "Fidelity 500 Index Fund", shares: 222 },
      { ticker: "FSGGX", name: "Fidelity Global ex U.S. Index Fund", shares: 1045 },

      { ticker: "FXAIX", name: "Fidelity 500 Index Fund", shares: 866 },
      { ticker: "FTIHX", name: "Fidelity Total International Index Fund", shares: 3359 },
      { ticker: "FSSNX", name: "Fidelity Small Cap Index Fund", shares: 1279 },
      { ticker: "FSMDX", name: "Fidelity Mid Cap Index Fund", shares: 1070 },
      { ticker: "FXNAX", name: "Fidelity U.S. Bond Index Fund", shares: 12 },
      { ticker: "SAGIC", name: "SAGIC Bond Diversified", manual: true, manualValue: 62691 }
    ];

    // Identical tickers are combined, while the order of first appearance is preserved.
    const consolidatedHoldings = [...holdings.reduce((map, holding) => {
      const existing = map.get(holding.ticker);
      if (existing) {
        existing.shares = Number(existing.shares || 0) + Number(holding.shares || 0);
        if (holding.manualValue != null) {
          existing.manualValue = Number(existing.manualValue || 0) + Number(holding.manualValue || 0);
        }
      } else {
        map.set(holding.ticker, { ...holding });
      }
      return map;
    }, new Map()).values()];

    const rowsElement = document.getElementById("stockRows");
    const statusElement = document.getElementById("status");
    const lastUpdatedElement = document.getElementById("lastUpdated");
    const refreshButton = document.getElementById("refreshButton");
    const todayDollarsElement = document.getElementById("todayDollars");
    const todayPercentElement = document.getElementById("todayPercent");

    const currencyFormatter = new Intl.NumberFormat("en-US", {
      style: "currency",
      currency: "USD",
      maximumFractionDigits: 0
    });

    const numberFormatter = new Intl.NumberFormat("en-US", {
      maximumFractionDigits: 4
    });

    let etfQuoteMap = {};
    let mutualFundNavMap = {};
    let sortState = { key: null, direction: 1 };

    function formatPercent(value) {
      if (!Number.isFinite(value)) return "—";
      const sign = value > 0 ? "+" : "";
      return `${sign}${value.toFixed(2)}%`;
    }

    function formatSignedCurrency(value) {
      if (!Number.isFinite(value)) return "—";
      const sign = value > 0 ? "+" : "";
      return `${sign}${currencyFormatter.format(value)}`;
    }

    function valueClass(value) {
      if (value > 0) return "positive";
      if (value < 0) return "negative";
      return "";
    }

    function validPositiveNumber(value) {
      const number = Number(value);
      return Number.isFinite(number) && number > 0 ? number : NaN;
    }

    function deriveRow(holding) {
      if (holding.manual) {
        const manualValue = Number(holding.manualValue);
        return {
          ...holding,
          dayPercent: NaN,
          todayGain: NaN,
          priorValue: Number.isFinite(manualValue) ? manualValue : NaN,
          currentValue: Number.isFinite(manualValue) ? manualValue : NaN,
          quoteAvailable: Number.isFinite(manualValue),
          note: "Manual · no daily estimate"
        };
      }

      const proxySymbol = FUND_PROXIES[holding.ticker];

      if (proxySymbol) {
        const priorNav = validPositiveNumber(mutualFundNavMap[holding.ticker]?.priorNav);
        const proxyQuote = etfQuoteMap[proxySymbol];
        const proxyCurrent = validPositiveNumber(proxyQuote?.current);
        const proxyPreviousClose = validPositiveNumber(proxyQuote?.previousClose);

        const proxyRatio = Number.isFinite(proxyCurrent) && Number.isFinite(proxyPreviousClose)
          ? proxyCurrent / proxyPreviousClose
          : NaN;

        const estimatedPrice = Number.isFinite(priorNav) && Number.isFinite(proxyRatio)
          ? priorNav * proxyRatio
          : NaN;

        const dayPercent = Number.isFinite(proxyRatio)
          ? (proxyRatio - 1) * 100
          : NaN;

        const todayGain = Number.isFinite(estimatedPrice) && Number.isFinite(priorNav)
          ? holding.shares * (estimatedPrice - priorNav)
          : NaN;

        return {
          ...holding,
          proxySymbol,
          priorNav,
          estimatedPrice,
          dayPercent,
          todayGain,
          priorValue: Number.isFinite(priorNav) ? holding.shares * priorNav : NaN,
          currentValue: Number.isFinite(estimatedPrice) ? holding.shares * estimatedPrice : NaN,
          quoteAvailable: Number.isFinite(estimatedPrice),
          note: `Estimate via ${proxySymbol}`
        };
      }

      const quote = etfQuoteMap[holding.ticker];
      const current = validPositiveNumber(quote?.current);
      const previousClose = validPositiveNumber(quote?.previousClose);
      const dayPercent = Number.isFinite(current) && Number.isFinite(previousClose)
        ? ((current / previousClose) - 1) * 100
        : NaN;
      const todayGain = Number.isFinite(current) && Number.isFinite(previousClose)
        ? holding.shares * (current - previousClose)
        : NaN;

      return {
        ...holding,
        dayPercent,
        todayGain,
        priorValue: Number.isFinite(previousClose) ? holding.shares * previousClose : NaN,
        currentValue: Number.isFinite(current) ? holding.shares * current : NaN,
        quoteAvailable: Number.isFinite(current) && Number.isFinite(previousClose),
        note: "Live ETF quote"
      };
    }

    function compareRows(a, b, key, direction) {
      const left = a[key];
      const right = b[key];
      if (typeof left === "string" || typeof right === "string") {
        return String(left).localeCompare(String(right)) * direction;
      }
      const leftValid = Number.isFinite(left);
      const rightValid = Number.isFinite(right);
      if (!leftValid && !rightValid) return 0;
      if (!leftValid) return 1;
      if (!rightValid) return -1;
      return (left - right) * direction;
    }

    function render() {
      let rows = consolidatedHoldings.map(deriveRow);
      if (sortState.key) {
        rows = [...rows].sort((a, b) => compareRows(a, b, sortState.key, sortState.direction));
      }

      let totalTodayGain = 0;
      let totalPriorValue = 0;
      let hasTodayGain = false;

      for (const row of rows) {
        if (Number.isFinite(row.todayGain)) {
          totalTodayGain += row.todayGain;
          hasTodayGain = true;
        }
        if (Number.isFinite(row.priorValue)) totalPriorValue += row.priorValue;
      }

      const totalTodayPercent = hasTodayGain && totalPriorValue > 0
        ? (totalTodayGain / totalPriorValue) * 100
        : NaN;

      todayDollarsElement.textContent = hasTodayGain
        ? formatSignedCurrency(totalTodayGain)
        : "—";
      todayDollarsElement.className = `today-dollars ${valueClass(totalTodayGain)}`;

      todayPercentElement.textContent = formatPercent(totalTodayPercent);
      todayPercentElement.className = `today-percent ${valueClass(totalTodayPercent)}`;

      rowsElement.innerHTML = rows.map((row) => {
        const estimateBadge = row.proxySymbol ? '<span class="badge">EST</span>' : "";
        const manualBadge = row.manual ? '<span class="badge">MANUAL</span>' : "";
        const unavailableBadge = !row.quoteAvailable && !row.manual
          ? '<span class="badge">NO QUOTE</span>'
          : "";

        return `
          <tr>
            <td class="ticker">
              ${row.ticker}${estimateBadge}${manualBadge}${unavailableBadge}
              <div class="fund-note">${row.note}</div>
            </td>
            <td class="${valueClass(row.dayPercent)}">${formatPercent(row.dayPercent)}</td>
            <td class="${valueClass(row.todayGain)}">${formatSignedCurrency(row.todayGain)}</td>
            <td>${Number.isFinite(row.shares) ? numberFormatter.format(row.shares) : "—"}</td>
          </tr>
        `;
      }).join("");
    }

    async function fetchFinnhubQuote(symbol) {
      const url = new URL("https://finnhub.io/api/v1/quote");
      url.searchParams.set("symbol", symbol);
      url.searchParams.set("token", FINNHUB_API_KEY);

      const response = await fetch(url);
      const data = await response.json();

      if (!response.ok) {
        throw new Error(`${symbol} / Finnhub: ${data.error || `HTTP ${response.status}`}`);
      }

      const current = validPositiveNumber(data.c);
      const previousClose = validPositiveNumber(data.pc);

      if (!Number.isFinite(current) || !Number.isFinite(previousClose)) {
        throw new Error(`${symbol} / Finnhub: incomplete quote`);
      }

      return [symbol, { current, previousClose }];
    }

    async function fetchTwelveDataPriorNav(symbol) {
      const url = new URL("https://api.twelvedata.com/quote");
      url.searchParams.set("symbol", symbol);
      url.searchParams.set("apikey", TWELVE_DATA_API_KEY);

      const response = await fetch(url);
      const data = await response.json();

      if (!response.ok || data.status === "error") {
        throw new Error(`${symbol} / Twelve Data: ${data.message || `HTTP ${response.status}`}`);
      }

      const priorNav = validPositiveNumber(data.close);
      if (!Number.isFinite(priorNav)) {
        throw new Error(`${symbol} / Twelve Data: invalid prior NAV`);
      }

      return [symbol, { priorNav }];
    }

    async function fetchQuotes() {
      if (!FINNHUB_API_KEY || !TWELVE_DATA_API_KEY) {
        statusElement.textContent = "Add both API keys near the top of the script.";
        render();
        return;
      }

      refreshButton.disabled = true;
      statusElement.textContent = "Fetching quotes…";

      try {
        const mutualFundSymbols = [...new Set(
          consolidatedHoldings
            .map((holding) => holding.ticker)
            .filter((ticker) => Boolean(FUND_PROXIES[ticker]))
        )];

        const directEtfSymbols = consolidatedHoldings
          .filter((holding) => !holding.manual && !FUND_PROXIES[holding.ticker])
          .map((holding) => holding.ticker);

        const proxySymbols = mutualFundSymbols.map((ticker) => FUND_PROXIES[ticker]);

        // Direct holdings and shared mutual-fund proxies are deduplicated here.
        const etfSymbols = [...new Set([...directEtfSymbols, ...proxySymbols])];

        const [etfResults, navResults] = await Promise.all([
          Promise.allSettled(etfSymbols.map(fetchFinnhubQuote)),
          Promise.allSettled(mutualFundSymbols.map(fetchTwelveDataPriorNav))
        ]);

        const errors = [];
        let loadedEtfs = 0;
        let loadedNavs = 0;

        for (const result of etfResults) {
          if (result.status === "fulfilled") {
            const [symbol, quote] = result.value;
            etfQuoteMap[symbol] = quote;
            loadedEtfs += 1;
          } else {
            errors.push(result.reason?.message || "Unknown Finnhub error");
          }
        }

        for (const result of navResults) {
          if (result.status === "fulfilled") {
            const [symbol, nav] = result.value;
            mutualFundNavMap[symbol] = nav;
            loadedNavs += 1;
          } else {
            errors.push(result.reason?.message || "Unknown Twelve Data error");
          }
        }

        render();
        lastUpdatedElement.textContent = `Last updated: ${new Date().toLocaleString()}`;

        statusElement.textContent = errors.length
          ? `Loaded ${loadedEtfs}/${etfSymbols.length} ETF quotes and ${loadedNavs}/${mutualFundSymbols.length} fund NAVs. ${errors.join("; ")}`
          : `Loaded ${loadedEtfs} unique ETF quotes and ${loadedNavs} unique fund NAVs.`;
      } catch (error) {
        statusElement.textContent = `Unexpected error: ${error?.message || String(error)}`;
      } finally {
        refreshButton.disabled = false;
      }
    }

    document.querySelectorAll("th.sortable").forEach((header) => {
      header.addEventListener("click", () => {
        const key = header.dataset.sort;
        if (sortState.key === key) sortState.direction *= -1;
        else sortState = { key, direction: 1 };
        render();
      });
    });

    refreshButton.addEventListener("click", fetchQuotes);
    render();
    fetchQuotes();
  </script>
</body>
</html>
